name: Ansible CI

on:
  push:
    branches:
      - main
      - test

jobs:
  ansible-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install Ansible
        run: |
          pip install ansible ansible-lint
      - name: Lint Playbooks
        run: ansible-lint site.yml

  deploy-to-aap:
    runs-on: ubuntu-latest
    needs: ansible-lint
    steps:
      - name: Trigger AAP Job Template
        run: |
          curl -X POST -H "Authorization: Bearer ${{ secrets.AAP_TOKEN }}"           https://aap.example.com/api/v2/job_templates/42/launch/
